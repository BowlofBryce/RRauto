<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contacts — CRM</title>
  <link rel="stylesheet" href="/crm.css" />
</head>
<body>
<script src="/crm.js"></script>
<div id="app">
  <div class="layout">
    <div id="sidebar-mount"></div>
    <div class="main">
      <div class="topbar">
        <span class="topbar-title">Contacts</span>
        <span id="count-badge" class="badge badge-gray" style="font-size:11px">0</span>
        <div class="topbar-spacer"></div>
        <div class="search-bar">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          <input id="search" type="text" placeholder="Search by name, email, phone…" />
        </div>
        <button class="btn btn-primary" onclick="CRM.openModal('new-modal')">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
          New Contact
        </button>
      </div>
      <div class="content">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Phone</th>
                <th>Address</th>
                <th>Tags</th>
                <th>Added</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Detail Panel Backdrop -->
<div id="panel-backdrop" onclick="closePanel()" style="display:none;position:fixed;inset:0;z-index:40;background:transparent"></div>

<!-- Detail Panel -->
<div class="detail-panel" id="detail-panel">
  <div class="detail-header">
    <div class="avatar" id="dp-avatar" style="width:34px;height:34px;font-size:13px;flex-shrink:0">?</div>
    <div class="detail-title" id="dp-name">—</div>
    <button class="btn btn-secondary btn-sm" onclick="openEdit()">Edit</button>
    <button class="modal-close" onclick="closePanel()">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
  </div>
  <div class="detail-body">
    <div class="detail-field"><div class="detail-field-label">Email</div><div class="detail-field-value" id="dp-email">—</div></div>
    <div class="detail-field"><div class="detail-field-label">Phone</div><div class="detail-field-value" id="dp-phone">—</div></div>
    <div class="detail-field"><div class="detail-field-label">Address</div><div class="detail-field-value" id="dp-address">—</div></div>
    <div class="detail-field"><div class="detail-field-label">Tags</div><div class="detail-field-value" id="dp-tags">—</div></div>
    <div class="detail-field"><div class="detail-field-label">Notes</div><div class="detail-field-value" id="dp-notes" style="white-space:pre-wrap;color:var(--text-secondary)">—</div></div>
    <div class="detail-field"><div class="detail-field-label">Created</div><div class="detail-field-value" id="dp-created">—</div></div>
    <hr class="divider" />
    <button class="btn btn-danger btn-sm" style="width:100%" onclick="deleteContact()">Delete Contact</button>
  </div>
</div>

<!-- New Contact Modal -->
<div class="modal-overlay" id="new-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">New Contact</div>
      <button class="modal-close" onclick="CRM.closeModal('new-modal')"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg></button>
    </div>
    <form id="new-form">
      <div class="modal-body">
        <div class="form-group"><label class="form-label">Full Name *</label><input class="form-input" id="n-name" required placeholder="Jane Smith" /></div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Email</label><input class="form-input" id="n-email" type="email" placeholder="jane@example.com" /></div>
          <div class="form-group"><label class="form-label">Phone</label><input class="form-input" id="n-phone" type="tel" placeholder="(555) 000-0000" /></div>
        </div>
        <div class="form-group"><label class="form-label">Address</label><input class="form-input" id="n-address" placeholder="123 Main St, City, State" /></div>
        <div class="form-group"><label class="form-label">Tags <span style="font-weight:400;color:var(--text-tertiary)">(comma-separated)</span></label><input class="form-input" id="n-tags" placeholder="residential, vip" /></div>
        <div class="form-group"><label class="form-label">Notes</label><textarea class="form-input" id="n-notes" placeholder="Any relevant notes…"></textarea></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" onclick="CRM.closeModal('new-modal')">Cancel</button>
        <button type="submit" class="btn btn-primary">Create Contact</button>
      </div>
    </form>
  </div>
</div>

<!-- Edit Contact Modal -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Edit Contact</div>
      <button class="modal-close" onclick="CRM.closeModal('edit-modal')"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg></button>
    </div>
    <form id="edit-form">
      <div class="modal-body">
        <div class="form-group"><label class="form-label">Full Name *</label><input class="form-input" id="e-name" required /></div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Email</label><input class="form-input" id="e-email" type="email" /></div>
          <div class="form-group"><label class="form-label">Phone</label><input class="form-input" id="e-phone" type="tel" /></div>
        </div>
        <div class="form-group"><label class="form-label">Address</label><input class="form-input" id="e-address" /></div>
        <div class="form-group"><label class="form-label">Tags <span style="font-weight:400;color:var(--text-tertiary)">(comma-separated)</span></label><input class="form-input" id="e-tags" /></div>
        <div class="form-group"><label class="form-label">Notes</label><textarea class="form-input" id="e-notes"></textarea></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" onclick="CRM.closeModal('edit-modal')">Cancel</button>
        <button type="submit" class="btn btn-primary">Save Changes</button>
      </div>
    </form>
  </div>
</div>

<script>
  document.getElementById('sidebar-mount').outerHTML = CRM.buildSidebar('contacts');

  let contacts = [], selected = null;

  function tagsHtml(tags) {
    if (!tags || !tags.length) return '<span class="cell-muted">—</span>';
    return tags.map(t => '<span class="tag">' + t + '</span>').join(' ');
  }

  function render(data) {
    const tbody = document.getElementById('tbody');
    if (!data.length) {
      tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state"><svg class="empty-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg><div class="empty-title">No contacts yet</div><div class="empty-sub">Add your first contact to start building your database</div></div></td></tr>';
      return;
    }
    tbody.innerHTML = data.map(c => '<tr onclick="openDetail(\'' + c.id + '\')">' +
      '<td><div class="name-cell"><div class="avatar">' + CRM.initials(c.name) + '</div><div><div style="font-weight:500">' + c.name + '</div>' + (c.email ? '<div class="cell-muted cell-sm">' + c.email + '</div>' : '') + '</div></div></td>' +
      '<td class="cell-muted">' + (c.phone || '—') + '</td>' +
      '<td class="cell-muted" style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + (c.address || '—') + '</td>' +
      '<td>' + tagsHtml(c.tags) + '</td>' +
      '<td class="cell-muted cell-sm">' + CRM.formatDate(c.created_at) + '</td>' +
      '</tr>').join('');
  }

  function openDetail(id) {
    selected = contacts.find(c => c.id === id);
    if (!selected) return;
    document.getElementById('dp-avatar').textContent = CRM.initials(selected.name);
    document.getElementById('dp-name').textContent = selected.name;
    document.getElementById('dp-email').textContent = selected.email || '—';
    document.getElementById('dp-phone').textContent = selected.phone || '—';
    document.getElementById('dp-address').textContent = selected.address || '—';
    document.getElementById('dp-tags').innerHTML = tagsHtml(selected.tags);
    document.getElementById('dp-notes').textContent = selected.notes || '—';
    document.getElementById('dp-created').textContent = CRM.formatDate(selected.created_at);
    document.getElementById('detail-panel').classList.add('open');
    document.getElementById('panel-backdrop').style.display = 'block';
  }

  function closePanel() {
    document.getElementById('detail-panel').classList.remove('open');
    document.getElementById('panel-backdrop').style.display = 'none';
  }

  function openEdit() {
    if (!selected) return;
    document.getElementById('e-name').value = selected.name || '';
    document.getElementById('e-email').value = selected.email || '';
    document.getElementById('e-phone').value = selected.phone || '';
    document.getElementById('e-address').value = selected.address || '';
    document.getElementById('e-tags').value = (selected.tags || []).join(', ');
    document.getElementById('e-notes').value = selected.notes || '';
    CRM.openModal('edit-modal');
  }

  async function deleteContact() {
    if (!selected || !confirm('Delete ' + selected.name + '? This cannot be undone.')) return;
    try {
      await CRM.api('/contacts/' + selected.id, { method: 'DELETE' });
      closePanel();
      CRM.toast('Contact deleted', 'success');
      await load();
    } catch(err) { CRM.toast(err.message, 'error'); }
  }

  document.getElementById('new-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const body = {
      name: document.getElementById('n-name').value,
      email: document.getElementById('n-email').value || null,
      phone: document.getElementById('n-phone').value || null,
      address: document.getElementById('n-address').value || null,
      tags: document.getElementById('n-tags').value.split(',').map(function(t){return t.trim();}).filter(Boolean),
      notes: document.getElementById('n-notes').value || null,
    };
    try {
      await CRM.api('/contacts', { method: 'POST', body: JSON.stringify(body) });
      CRM.closeModal('new-modal');
      CRM.toast('Contact created', 'success');
      await load();
    } catch(err) { CRM.toast(err.message, 'error'); }
  });

  document.getElementById('edit-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    if (!selected) return;
    const body = {
      name: document.getElementById('e-name').value,
      email: document.getElementById('e-email').value || null,
      phone: document.getElementById('e-phone').value || null,
      address: document.getElementById('e-address').value || null,
      tags: document.getElementById('e-tags').value.split(',').map(function(t){return t.trim();}).filter(Boolean),
      notes: document.getElementById('e-notes').value || null,
    };
    try {
      await CRM.api('/contacts/' + selected.id, { method: 'PATCH', body: JSON.stringify(body) });
      CRM.closeModal('edit-modal');
      closePanel();
      CRM.toast('Contact updated', 'success');
      await load();
    } catch(err) { CRM.toast(err.message, 'error'); }
  });

  document.getElementById('search').addEventListener('input', function() {
    const q = this.value.toLowerCase();
    const filtered = contacts.filter(c =>
      (c.name||'').toLowerCase().includes(q) ||
      (c.email||'').toLowerCase().includes(q) ||
      (c.phone||'').toLowerCase().includes(q)
    );
    document.getElementById('count-badge').textContent = filtered.length;
    render(filtered);
  });

  async function load() {
    try {
      contacts = await CRM.api('/contacts');
      document.getElementById('count-badge').textContent = contacts.length;
      render(contacts);
    } catch(err) { CRM.toast(err.message, 'error'); }
  }

  load();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jobs — CRM</title>
  <link rel="stylesheet" href="/crm.css" />
</head>
<body>
<script src="/crm.js"></script>
<div class="layout">
  <div id="sidebar-mount"></div>
  <div class="main">
    <div class="topbar">
      <span class="topbar-title">Jobs</span>
      <span id="count-badge" class="badge badge-gray" style="font-size:11px">0</span>
      <div class="topbar-spacer"></div>
      <div class="filter-bar" style="margin-bottom:0">
        <span class="filter-chip active" onclick="setFilter('all',this)">All</span>
        <span class="filter-chip" onclick="setFilter('scheduled',this)">Scheduled</span>
        <span class="filter-chip" onclick="setFilter('in_progress',this)">In Progress</span>
        <span class="filter-chip" onclick="setFilter('completed',this)">Completed</span>
        <span class="filter-chip" onclick="setFilter('cancelled',this)">Cancelled</span>
      </div>
      <button class="btn btn-primary" onclick="CRM.openModal('new-modal')">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
        New Job
      </button>
    </div>
    <div class="content">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Service Type</th>
              <th>Contact ID</th>
              <th>Status</th>
              <th>Scheduled Date</th>
              <th>Price</th>
              <th>Notes</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Detail Panel -->
<div id="panel-backdrop" onclick="closePanel()" style="display:none;position:fixed;inset:0;z-index:40"></div>
<div class="detail-panel" id="detail-panel">
  <div class="detail-header">
    <div class="detail-title" id="dp-title">Job</div>
    <button class="btn btn-secondary btn-sm" onclick="openEdit()">Edit</button>
    <button class="modal-close" onclick="closePanel()"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg></button>
  </div>
  <div class="detail-body">
    <div class="detail-field"><div class="detail-field-label">Service Type</div><div class="detail-field-value" id="dp-service">—</div></div>
    <div class="detail-field"><div class="detail-field-label">Contact ID</div><div class="detail-field-value" id="dp-contact" style="font-family:monospace;font-size:12px">—</div></div>
    <div class="detail-field"><div class="detail-field-label">Status</div><div class="detail-field-value" id="dp-status">—</div></div>
    <div class="detail-field"><div class="detail-field-label">Scheduled Date</div><div class="detail-field-value" id="dp-date">—</div></div>
    <div class="detail-field"><div class="detail-field-label">Price</div><div class="detail-field-value" id="dp-price">—</div></div>
    <div class="detail-field"><div class="detail-field-label">Notes</div><div class="detail-field-value" id="dp-notes" style="white-space:pre-wrap;color:var(--text-secondary)">—</div></div>
    <hr class="divider" />
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <button class="btn btn-secondary btn-sm" onclick="updateStatus('in_progress')">Start Job</button>
      <button class="btn btn-primary btn-sm" onclick="updateStatus('completed')">Complete</button>
      <button class="btn btn-ghost btn-sm" onclick="updateStatus('cancelled')" style="grid-column:span 2">Cancel Job</button>
    </div>
    <div style="margin-top:8px">
      <button class="btn btn-danger btn-sm" style="width:100%" onclick="deleteJob()">Delete Job</button>
    </div>
  </div>
</div>

<!-- New Job Modal -->
<div class="modal-overlay" id="new-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">New Job</div>
      <button class="modal-close" onclick="CRM.closeModal('new-modal')"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg></button>
    </div>
    <form id="new-form">
      <div class="modal-body">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Service Type *</label>
            <select class="form-input" id="n-service" required>
              <option value="">— Select service —</option>
              <option>Lawn Mowing</option><option>Landscaping</option><option>Window Washing</option>
              <option>Pressure Washing</option><option>Grout Cleaning</option><option>Gutter Cleaning</option>
              <option>Snow Removal</option><option>General Cleaning</option><option>Consultation</option><option>Other</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Status</label>
            <select class="form-input" id="n-status">
              <option value="scheduled">Scheduled</option>
              <option value="in_progress">In Progress</option>
              <option value="completed">Completed</option>
              <option value="cancelled">Cancelled</option>
            </select>
          </div>
        </div>
        <div class="form-group"><label class="form-label">Contact ID *</label><input class="form-input" id="n-contact" required placeholder="Paste contact UUID" /></div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Scheduled Date</label><input class="form-input" id="n-date" type="datetime-local" /></div>
          <div class="form-group"><label class="form-label">Price ($)</label><input class="form-input" id="n-price" type="number" min="0" step="0.01" placeholder="0.00" /></div>
        </div>
        <div class="form-group"><label class="form-label">Notes</label><textarea class="form-input" id="n-notes" placeholder="Job details, special instructions…"></textarea></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" onclick="CRM.closeModal('new-modal')">Cancel</button>
        <button type="submit" class="btn btn-primary">Create Job</button>
      </div>
    </form>
  </div>
</div>

<!-- Edit Job Modal -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Edit Job</div>
      <button class="modal-close" onclick="CRM.closeModal('edit-modal')"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg></button>
    </div>
    <form id="edit-form">
      <div class="modal-body">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Service Type</label>
            <select class="form-input" id="e-service">
              <option value="">— Select service —</option>
              <option>Lawn Mowing</option><option>Landscaping</option><option>Window Washing</option>
              <option>Pressure Washing</option><option>Grout Cleaning</option><option>Gutter Cleaning</option>
              <option>Snow Removal</option><option>General Cleaning</option><option>Consultation</option><option>Other</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Status</label>
            <select class="form-input" id="e-status">
              <option value="scheduled">Scheduled</option>
              <option value="in_progress">In Progress</option>
              <option value="completed">Completed</option>
              <option value="cancelled">Cancelled</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Scheduled Date</label><input class="form-input" id="e-date" type="datetime-local" /></div>
          <div class="form-group"><label class="form-label">Price ($)</label><input class="form-input" id="e-price" type="number" min="0" step="0.01" /></div>
        </div>
        <div class="form-group"><label class="form-label">Notes</label><textarea class="form-input" id="e-notes"></textarea></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" onclick="CRM.closeModal('edit-modal')">Cancel</button>
        <button type="submit" class="btn btn-primary">Save Changes</button>
      </div>
    </form>
  </div>
</div>

<script>
  document.getElementById('sidebar-mount').outerHTML = CRM.buildSidebar('jobs');

  let jobs = [], selected = null, activeFilter = 'all';

  function statusBadge(s) {
    const map = { in_progress: 'badge-blue', scheduled: 'badge-yellow', completed: 'badge-green', cancelled: 'badge-red' };
    const label = s === 'in_progress' ? 'In Progress' : s ? s.charAt(0).toUpperCase() + s.slice(1) : '—';
    return '<span class="badge ' + (map[s] || 'badge-gray') + '">' + label + '</span>';
  }

  function render(data) {
    const tbody = document.getElementById('tbody');
    if (!data.length) {
      tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><svg class="empty-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg><div class="empty-title">No jobs yet</div><div class="empty-sub">Schedule a job to start tracking your work</div></div></td></tr>';
      return;
    }
    tbody.innerHTML = data.map(j => '<tr onclick="openDetail(\'' + j.id + '\')">' +
      '<td style="font-weight:500">' + (j.service_type || '—') + '</td>' +
      '<td style="font-family:monospace;font-size:11px;color:var(--text-tertiary)">' + (j.contact_id||'').slice(0,8) + '…</td>' +
      '<td>' + statusBadge(j.status) + '</td>' +
      '<td class="cell-muted">' + CRM.formatDate(j.scheduled_date) + '</td>' +
      '<td style="font-weight:500">' + CRM.formatCurrency(j.price) + '</td>' +
      '<td class="cell-muted" style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + (j.notes || '—') + '</td>' +
      '</tr>').join('');
  }

  function setFilter(f, el) {
    activeFilter = f;
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    const filtered = f === 'all' ? jobs : jobs.filter(j => j.status === f);
    document.getElementById('count-badge').textContent = filtered.length;
    render(filtered);
  }

  function openDetail(id) {
    selected = jobs.find(j => j.id === id);
    if (!selected) return;
    document.getElementById('dp-title').textContent = selected.service_type || 'Job';
    document.getElementById('dp-service').textContent = selected.service_type || '—';
    document.getElementById('dp-contact').textContent = selected.contact_id || '—';
    document.getElementById('dp-status').innerHTML = statusBadge(selected.status);
    document.getElementById('dp-date').textContent = CRM.formatDate(selected.scheduled_date);
    document.getElementById('dp-price').textContent = CRM.formatCurrency(selected.price);
    document.getElementById('dp-notes').textContent = selected.notes || '—';
    document.getElementById('detail-panel').classList.add('open');
    document.getElementById('panel-backdrop').style.display = 'block';
  }

  function closePanel() {
    document.getElementById('detail-panel').classList.remove('open');
    document.getElementById('panel-backdrop').style.display = 'none';
  }

  function openEdit() {
    if (!selected) return;
    document.getElementById('e-service').value = selected.service_type || '';
    document.getElementById('e-status').value = selected.status || 'scheduled';
    document.getElementById('e-date').value = selected.scheduled_date ? selected.scheduled_date.slice(0,16) : '';
    document.getElementById('e-price').value = selected.price || '';
    document.getElementById('e-notes').value = selected.notes || '';
    CRM.openModal('edit-modal');
  }

  async function updateStatus(status) {
    if (!selected) return;
    try {
      await CRM.api('/jobs/' + selected.id, { method: 'PATCH', body: JSON.stringify({ status }) });
      closePanel();
      CRM.toast('Job updated', 'success');
      await load();
    } catch(err) { CRM.toast(err.message, 'error'); }
  }

  async function deleteJob() {
    if (!selected || !confirm('Delete this job? This cannot be undone.')) return;
    try {
      await CRM.api('/jobs/' + selected.id, { method: 'DELETE' });
      closePanel();
      CRM.toast('Job deleted', 'success');
      await load();
    } catch(err) { CRM.toast(err.message, 'error'); }
  }

  document.getElementById('new-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const body = {
      service_type: document.getElementById('n-service').value,
      contact_id: document.getElementById('n-contact').value,
      status: document.getElementById('n-status').value,
      scheduled_date: document.getElementById('n-date').value || null,
      price: document.getElementById('n-price').value ? parseFloat(document.getElementById('n-price').value) : null,
      notes: document.getElementById('n-notes').value || null,
    };
    try {
      await CRM.api('/jobs', { method: 'POST', body: JSON.stringify(body) });
      CRM.closeModal('new-modal');
      CRM.toast('Job created', 'success');
      await load();
    } catch(err) { CRM.toast(err.message, 'error'); }
  });

  document.getElementById('edit-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    if (!selected) return;
    const body = {
      service_type: document.getElementById('e-service').value,
      status: document.getElementById('e-status').value,
      scheduled_date: document.getElementById('e-date').value || null,
      price: document.getElementById('e-price').value ? parseFloat(document.getElementById('e-price').value) : null,
      notes: document.getElementById('e-notes').value || null,
    };
    try {
      await CRM.api('/jobs/' + selected.id, { method: 'PATCH', body: JSON.stringify(body) });
      CRM.closeModal('edit-modal');
      closePanel();
      CRM.toast('Job updated', 'success');
      await load();
    } catch(err) { CRM.toast(err.message, 'error'); }
  });

  async function load() {
    try {
      jobs = await CRM.api('/jobs');
      const filtered = activeFilter === 'all' ? jobs : jobs.filter(j => j.status === activeFilter);
      document.getElementById('count-badge').textContent = filtered.length;
      render(filtered);
    } catch(err) { CRM.toast(err.message, 'error'); }
  }

  load();
</script>
</body>
</html>

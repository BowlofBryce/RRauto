<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quotes — CRM</title>
  <link rel="stylesheet" href="/crm.css" />
</head>
<body>
<script src="/crm.js"></script>
<div class="layout">
  <div id="sidebar-mount"></div>
  <div class="main">
    <div class="topbar">
      <span class="topbar-title">Quotes</span>
      <span id="count-badge" class="badge badge-gray" style="font-size:11px">0</span>
      <div class="topbar-spacer"></div>
      <div class="filter-bar" style="margin-bottom:0">
        <span class="filter-chip active" onclick="setFilter('all',this)">All</span>
        <span class="filter-chip" onclick="setFilter('draft',this)">Draft</span>
        <span class="filter-chip" onclick="setFilter('sent',this)">Sent</span>
        <span class="filter-chip" onclick="setFilter('accepted',this)">Accepted</span>
        <span class="filter-chip" onclick="setFilter('rejected',this)">Rejected</span>
      </div>
      <button class="btn btn-primary" onclick="CRM.openModal('new-modal')">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
        New Quote
      </button>
    </div>
    <div class="content">
      <div id="stats-row" class="stats-row"></div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Contact ID</th>
              <th>Amount</th>
              <th>Status</th>
              <th>Sent Date</th>
              <th>Accepted Date</th>
              <th>Notes</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Detail Panel -->
<div id="panel-backdrop" onclick="closePanel()" style="display:none;position:fixed;inset:0;z-index:40"></div>
<div class="detail-panel" id="detail-panel">
  <div class="detail-header">
    <div class="detail-title" id="dp-title">Quote</div>
    <button class="btn btn-secondary btn-sm" onclick="openEdit()">Edit</button>
    <button class="modal-close" onclick="closePanel()"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg></button>
  </div>
  <div class="detail-body">
    <div class="detail-field"><div class="detail-field-label">Contact ID</div><div class="detail-field-value" id="dp-contact" style="font-family:monospace;font-size:12px">—</div></div>
    <div class="detail-field"><div class="detail-field-label">Amount</div><div class="detail-field-value" id="dp-amount" style="font-size:20px;font-weight:700">—</div></div>
    <div class="detail-field"><div class="detail-field-label">Status</div><div class="detail-field-value" id="dp-status">—</div></div>
    <div class="detail-field"><div class="detail-field-label">Sent Date</div><div class="detail-field-value" id="dp-sent">—</div></div>
    <div class="detail-field"><div class="detail-field-label">Accepted Date</div><div class="detail-field-value" id="dp-accepted">—</div></div>
    <div class="detail-field"><div class="detail-field-label">Notes</div><div class="detail-field-value" id="dp-notes" style="white-space:pre-wrap;color:var(--text-secondary)">—</div></div>
    <hr class="divider" />
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <button class="btn btn-secondary btn-sm" onclick="updateStatus('sent')">Mark Sent</button>
      <button class="btn btn-primary btn-sm" onclick="updateStatus('accepted')">Mark Accepted</button>
      <button class="btn btn-ghost btn-sm" onclick="updateStatus('rejected')" style="grid-column:span 2">Mark Rejected</button>
    </div>
    <div style="margin-top:8px">
      <button class="btn btn-danger btn-sm" style="width:100%" onclick="deleteQuote()">Delete Quote</button>
    </div>
  </div>
</div>

<!-- New Quote Modal -->
<div class="modal-overlay" id="new-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">New Quote</div>
      <button class="modal-close" onclick="CRM.closeModal('new-modal')"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg></button>
    </div>
    <form id="new-form">
      <div class="modal-body">
        <div class="form-group"><label class="form-label">Contact ID *</label><input class="form-input" id="n-contact" required placeholder="Paste contact UUID" /></div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Amount ($) *</label><input class="form-input" id="n-amount" type="number" required min="0" step="0.01" placeholder="0.00" /></div>
          <div class="form-group">
            <label class="form-label">Status</label>
            <select class="form-input" id="n-status">
              <option value="draft">Draft</option>
              <option value="sent">Sent</option>
              <option value="accepted">Accepted</option>
              <option value="rejected">Rejected</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Sent Date</label><input class="form-input" id="n-sent" type="date" /></div>
          <div class="form-group"><label class="form-label">Accepted Date</label><input class="form-input" id="n-accepted" type="date" /></div>
        </div>
        <div class="form-group"><label class="form-label">Notes</label><textarea class="form-input" id="n-notes" placeholder="Scope of work, terms, etc."></textarea></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" onclick="CRM.closeModal('new-modal')">Cancel</button>
        <button type="submit" class="btn btn-primary">Create Quote</button>
      </div>
    </form>
  </div>
</div>

<!-- Edit Quote Modal -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Edit Quote</div>
      <button class="modal-close" onclick="CRM.closeModal('edit-modal')"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg></button>
    </div>
    <form id="edit-form">
      <div class="modal-body">
        <div class="form-row">
          <div class="form-group"><label class="form-label">Amount ($)</label><input class="form-input" id="e-amount" type="number" min="0" step="0.01" /></div>
          <div class="form-group">
            <label class="form-label">Status</label>
            <select class="form-input" id="e-status">
              <option value="draft">Draft</option>
              <option value="sent">Sent</option>
              <option value="accepted">Accepted</option>
              <option value="rejected">Rejected</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Sent Date</label><input class="form-input" id="e-sent" type="date" /></div>
          <div class="form-group"><label class="form-label">Accepted Date</label><input class="form-input" id="e-accepted" type="date" /></div>
        </div>
        <div class="form-group"><label class="form-label">Notes</label><textarea class="form-input" id="e-notes"></textarea></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" onclick="CRM.closeModal('edit-modal')">Cancel</button>
        <button type="submit" class="btn btn-primary">Save Changes</button>
      </div>
    </form>
  </div>
</div>

<script>
  document.getElementById('sidebar-mount').outerHTML = CRM.buildSidebar('quotes');

  let quotes = [], selected = null, activeFilter = 'all';

  function statusBadge(s) { return CRM.statusBadge(s); }

  function renderStats(data) {
    const total = data.reduce((s, q) => s + parseFloat(q.amount || 0), 0);
    const accepted = data.filter(q => q.status === 'accepted');
    const acceptedVal = accepted.reduce((s, q) => s + parseFloat(q.amount || 0), 0);
    document.getElementById('stats-row').innerHTML =
      '<div class="stat-card"><div class="stat-label">Total Quotes</div><div class="stat-value">' + data.length + '</div></div>' +
      '<div class="stat-card"><div class="stat-label">Total Value</div><div class="stat-value">' + CRM.formatCurrency(total) + '</div></div>' +
      '<div class="stat-card"><div class="stat-label">Accepted</div><div class="stat-value">' + accepted.length + '</div></div>' +
      '<div class="stat-card"><div class="stat-label">Accepted Value</div><div class="stat-value">' + CRM.formatCurrency(acceptedVal) + '</div></div>';
  }

  function render(data) {
    const tbody = document.getElementById('tbody');
    if (!data.length) {
      tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><svg class="empty-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg><div class="empty-title">No quotes yet</div><div class="empty-sub">Create a quote to start tracking proposals</div></div></td></tr>';
      return;
    }
    tbody.innerHTML = data.map(q => '<tr onclick="openDetail(\'' + q.id + '\')">' +
      '<td style="font-family:monospace;font-size:11px;color:var(--text-tertiary)">' + (q.contact_id||'').slice(0,8) + '…</td>' +
      '<td style="font-weight:600">' + CRM.formatCurrency(q.amount) + '</td>' +
      '<td>' + statusBadge(q.status) + '</td>' +
      '<td class="cell-muted">' + CRM.formatDate(q.sent_date) + '</td>' +
      '<td class="cell-muted">' + CRM.formatDate(q.accepted_date) + '</td>' +
      '<td class="cell-muted" style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + (q.notes || '—') + '</td>' +
      '</tr>').join('');
  }

  function setFilter(f, el) {
    activeFilter = f;
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    const filtered = f === 'all' ? quotes : quotes.filter(q => q.status === f);
    document.getElementById('count-badge').textContent = filtered.length;
    render(filtered);
  }

  function openDetail(id) {
    selected = quotes.find(q => q.id === id);
    if (!selected) return;
    document.getElementById('dp-title').textContent = CRM.formatCurrency(selected.amount) + ' Quote';
    document.getElementById('dp-contact').textContent = selected.contact_id || '—';
    document.getElementById('dp-amount').textContent = CRM.formatCurrency(selected.amount);
    document.getElementById('dp-status').innerHTML = statusBadge(selected.status);
    document.getElementById('dp-sent').textContent = CRM.formatDate(selected.sent_date);
    document.getElementById('dp-accepted').textContent = CRM.formatDate(selected.accepted_date);
    document.getElementById('dp-notes').textContent = selected.notes || '—';
    document.getElementById('detail-panel').classList.add('open');
    document.getElementById('panel-backdrop').style.display = 'block';
  }

  function closePanel() {
    document.getElementById('detail-panel').classList.remove('open');
    document.getElementById('panel-backdrop').style.display = 'none';
  }

  function openEdit() {
    if (!selected) return;
    document.getElementById('e-amount').value = selected.amount || '';
    document.getElementById('e-status').value = selected.status || 'draft';
    document.getElementById('e-sent').value = selected.sent_date ? selected.sent_date.slice(0,10) : '';
    document.getElementById('e-accepted').value = selected.accepted_date ? selected.accepted_date.slice(0,10) : '';
    document.getElementById('e-notes').value = selected.notes || '';
    CRM.openModal('edit-modal');
  }

  async function updateStatus(status) {
    if (!selected) return;
    const extra = {};
    if (status === 'sent') extra.sent_date = new Date().toISOString();
    if (status === 'accepted') extra.accepted_date = new Date().toISOString();
    try {
      await CRM.api('/quotes/' + selected.id, { method: 'PATCH', body: JSON.stringify({ status, ...extra }) });
      closePanel();
      CRM.toast('Quote updated', 'success');
      await load();
    } catch(err) { CRM.toast(err.message, 'error'); }
  }

  async function deleteQuote() {
    if (!selected || !confirm('Delete this quote? This cannot be undone.')) return;
    try {
      await CRM.api('/quotes/' + selected.id, { method: 'DELETE' });
      closePanel();
      CRM.toast('Quote deleted', 'success');
      await load();
    } catch(err) { CRM.toast(err.message, 'error'); }
  }

  document.getElementById('new-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const body = {
      contact_id: document.getElementById('n-contact').value,
      amount: parseFloat(document.getElementById('n-amount').value),
      status: document.getElementById('n-status').value,
      sent_date: document.getElementById('n-sent').value || null,
      accepted_date: document.getElementById('n-accepted').value || null,
      notes: document.getElementById('n-notes').value || null,
    };
    try {
      await CRM.api('/quotes', { method: 'POST', body: JSON.stringify(body) });
      CRM.closeModal('new-modal');
      CRM.toast('Quote created', 'success');
      await load();
    } catch(err) { CRM.toast(err.message, 'error'); }
  });

  document.getElementById('edit-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    if (!selected) return;
    const body = {
      amount: parseFloat(document.getElementById('e-amount').value),
      status: document.getElementById('e-status').value,
      sent_date: document.getElementById('e-sent').value || null,
      accepted_date: document.getElementById('e-accepted').value || null,
      notes: document.getElementById('e-notes').value || null,
    };
    try {
      await CRM.api('/quotes/' + selected.id, { method: 'PATCH', body: JSON.stringify(body) });
      CRM.closeModal('edit-modal');
      closePanel();
      CRM.toast('Quote updated', 'success');
      await load();
    } catch(err) { CRM.toast(err.message, 'error'); }
  });

  async function load() {
    try {
      quotes = await CRM.api('/quotes');
      renderStats(quotes);
      const filtered = activeFilter === 'all' ? quotes : quotes.filter(q => q.status === activeFilter);
      document.getElementById('count-badge').textContent = filtered.length;
      render(filtered);
    } catch(err) { CRM.toast(err.message, 'error'); }
  }

  load();
</script>
</body>
</html>
